services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres-nest
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - my_network

  backend:
    image: test:dev
    container_name: backend-nest
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - postgres

networks:
  my_network:
    external: true

volumes:
  postgres_data:
  # kafka_data:
